<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bevatel Asset Hub</title>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --bg:#f0f4fb;
      --panel:#ffffff;
      --panel-2:#f8fafc;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --brand:#0a2540;
      --brand-2:#1d4ed8;
      --accent:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
      --info:#06b6d4;
      --shadow:0 4px 24px rgba(15,23,42,.07);
      --shadow-lg:0 12px 40px rgba(15,23,42,.12);
      --radius:18px;
      --radius-sm:12px;
      --sidebar-w:270px;
    }

    [data-theme="dark"]{
      --bg:#0d1117;
      --panel:#161b22;
      --panel-2:#1c2128;
      --text:#e6edf3;
      --muted:#8b949e;
      --line:#21262d;
      --brand:#1f6feb;
      --brand-2:#388bfd;
      --shadow:0 4px 24px rgba(0,0,0,.3);
      --shadow-lg:0 12px 40px rgba(0,0,0,.4);
    }

    *{box-sizing:border-box;transition:background-color .2s, color .2s, border-color .2s}
    html,body{height:100%;margin:0}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:"Segoe UI",Tahoma,Arial,sans-serif;
      direction:rtl;
    }

    .layout{
      display:grid;
      grid-template-columns:var(--sidebar-w) 1fr;
      min-height:100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar{
      background:linear-gradient(180deg,#0a2540 0%,#071a30 100%);
      color:#fff;
      padding:20px 16px;
      position:sticky;
      top:0;
      height:100vh;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:0;
    }
    [data-theme="dark"] .sidebar{
      background:linear-gradient(180deg,#0d1117 0%,#010409 100%);
      border-left:1px solid var(--line);
    }

    .brand{
      display:flex;align-items:center;gap:12px;
      padding-bottom:18px;margin-bottom:6px;
      border-bottom:1px solid rgba(255,255,255,.1);
    }
    .brand-badge{
      width:44px;height:44px;border-radius:14px;
      background:linear-gradient(135deg,#22c55e,#06b6d4);
      display:grid;place-items:center;
      font-weight:800;font-size:18px;color:#fff;
      box-shadow:0 8px 20px rgba(6,182,212,.3);
      flex-shrink:0;
    }
    .brand h1{margin:0;font-size:15px;line-height:1.3;color:#fff}
    .brand p{margin:3px 0 0;color:rgba(255,255,255,.55);font-size:11px}

    .nav{display:flex;flex-direction:column;gap:4px;margin-top:14px;flex:1}
    .nav button{
      border:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
      color:#c8d8ee;
      padding:11px 14px;border-radius:13px;
      font-size:13px;text-align:right;cursor:pointer;
      transition:all .18s;display:flex;align-items:center;gap:9px;
      font-family:inherit;
    }
    .nav button:hover{background:rgba(255,255,255,.08);transform:translateX(-2px)}
    .nav button.active{
      background:#fff;color:#0a2540;
      border-color:#fff;font-weight:700;
      box-shadow:0 6px 20px rgba(0,0,0,.15);
    }

    .sidebar-footer{
      margin-top:auto;padding-top:16px;
      border-top:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.45);font-size:11px;line-height:1.8;
    }

    /* ── MAIN ── */
    .main{padding:20px;min-width:0;display:flex;flex-direction:column;gap:0}

    .topbar{
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.7);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:16px 20px;
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }
    [data-theme="dark"] .topbar{
      background:rgba(22,27,34,.85);
      border-color:var(--line);
    }

    .page-head h2{margin:0;font-size:21px;font-weight:700}
    .page-head p{margin:4px 0 0;color:var(--muted);font-size:12px}

    .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

    /* ── BUTTONS ── */
    .btn{
      border:none;background:#eef2f7;color:var(--text);
      padding:10px 14px;border-radius:11px;cursor:pointer;
      font-size:13px;transition:.18s ease;
      display:inline-flex;align-items:center;gap:7px;
      white-space:nowrap;font-family:inherit;font-weight:500;
    }
    [data-theme="dark"] .btn{background:#21262d;color:var(--text)}
    .btn:hover{transform:translateY(-1px);filter:brightness(.97)}
    .btn.primary{background:linear-gradient(135deg,#0a2540,#1d4ed8);color:#fff;box-shadow:0 6px 18px rgba(29,78,216,.2)}
    .btn.success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
    .btn.warn{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff}
    .btn.danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
    .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text)}

    /* ── CARDS & GRIDS ── */
    .content{display:flex;flex-direction:column;gap:16px}

    .grid{display:grid;gap:14px}
    .grid.metrics{grid-template-columns:repeat(6,minmax(0,1fr))}
    .grid.two{grid-template-columns:1.2fr .8fr}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;min-width:0;
    }

    .metric{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;box-shadow:var(--shadow);
      padding:18px;min-width:0;
    }
    .metric .value{font-size:26px;font-weight:800;margin:0;letter-spacing:-.5px;color:var(--brand)}
    .metric .label{color:var(--muted);font-size:12px;margin-top:5px}
    .metric .sub{color:var(--muted);font-size:11px;margin-top:6px}

    /* ── SECTION TITLE ── */
    .section-title{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      margin-bottom:14px;
    }
    .section-title h3{margin:0;font-size:15px;font-weight:700}
    .section-title span{color:var(--muted);font-size:12px}

    /* ── TOOLBAR ── */
    .toolbar{
      display:grid;
      grid-template-columns:1.4fr .65fr .65fr .65fr auto auto;
      gap:10px;align-items:center;margin-bottom:14px;
    }

    input,select,textarea{
      width:100%;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      border-radius:11px;
      padding:10px 12px;font-size:13px;outline:none;
      transition:.15s ease;font-family:inherit;
    }
    input:focus,select:focus,textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(59,130,246,.1);
    }
    textarea{resize:vertical;min-height:80px}

    /* ── TABLE ── */
    .table-wrap{overflow:auto;border-radius:14px;border:1px solid var(--line);background:var(--panel)}
    table{width:100%;border-collapse:collapse;min-width:1100px;background:var(--panel)}
    thead th{
      position:sticky;top:0;
      background:var(--panel-2);
      color:var(--muted);font-size:11px;font-weight:700;
      padding:12px;border-bottom:1px solid var(--line);
      text-align:right;white-space:nowrap;z-index:2;
      text-transform:uppercase;letter-spacing:.4px;
    }
    tbody td{
      padding:11px 12px;border-bottom:1px solid var(--line);
      vertical-align:middle;font-size:13px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;
    }
    [data-theme="dark"] tbody tr:hover td{background:#1c2128}
    tbody tr:hover td{background:#f8fbff}

    .id{font-family:ui-monospace,monospace;direction:ltr;font-size:12px;font-weight:700}
    .subtext{font-size:11px;color:var(--muted);margin-top:3px}

    /* ── BADGES ── */
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:5px 10px;border-radius:999px;
      font-size:11px;font-weight:700;white-space:nowrap;
    }
    .status-active{background:#e8f8ee;color:#166534}
    .status-maintenance{background:#fff6df;color:#9a6700}
    .status-stored{background:#eef2f7;color:#475569}
    .status-retired{background:#fdecec;color:#991b1b}
    .status-lost{background:#ffe4e6;color:#9f1239}
    [data-theme="dark"] .status-active{background:#0d2818;color:#4ade80}
    [data-theme="dark"] .status-maintenance{background:#2d1f00;color:#fbbf24}
    [data-theme="dark"] .status-stored{background:#1c2128;color:#8b949e}
    [data-theme="dark"] .status-retired{background:#2d0a0a;color:#f87171}

    .condition-new{background:#ecfeff;color:#155e75}
    .condition-good{background:#e8f8ee;color:#166534}
    .condition-fair{background:#fff6df;color:#9a6700}
    .condition-poor{background:#fdecec;color:#991b1b}
    [data-theme="dark"] .condition-new{background:#0a1e22;color:#22d3ee}
    [data-theme="dark"] .condition-good{background:#0d2818;color:#4ade80}
    [data-theme="dark"] .condition-fair{background:#2d1f00;color:#fbbf24}
    [data-theme="dark"] .condition-poor{background:#2d0a0a;color:#f87171}

    /* ── ICON BUTTONS ── */
    .icon-btn{
      width:32px;height:32px;border:none;border-radius:9px;
      cursor:pointer;display:grid;place-items:center;
      transition:.15s ease;flex-shrink:0;font-size:13px;
      background:var(--panel-2);color:var(--text);
    }
    .icon-btn:hover{transform:translateY(-1px)}
    .icon-btn.primary{background:#e0ebff;color:#1d4ed8}
    .icon-btn.success{background:#e8f8ee;color:#166534}
    .icon-btn.warn{background:#fff6df;color:#9a6700}
    .icon-btn.danger{background:#fdecec;color:#991b1b}
    [data-theme="dark"] .icon-btn.primary{background:#112240;color:#60a5fa}
    [data-theme="dark"] .icon-btn.success{background:#0d2818;color:#4ade80}
    [data-theme="dark"] .icon-btn.warn{background:#2d1f00;color:#fbbf24}
    [data-theme="dark"] .icon-btn.danger{background:#2d0a0a;color:#f87171}

    .actions{display:flex;gap:6px;justify-content:flex-start;flex-wrap:wrap}

    /* ── BARCODE ── */
    .barcode-cell{
      display:inline-block;background:#fff;
      border:1px solid #e2e8f0;border-radius:8px;
      padding:5px 6px 2px;min-width:140px;
    }
    .barcode-cell svg{width:100%;height:38px;display:block}

    /* ── BAR ROWS ── */
    .bar-row{display:grid;grid-template-columns:120px 1fr 80px;gap:10px;align-items:center;margin-bottom:10px}
    .bar-label{color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar-track{height:9px;border-radius:999px;background:var(--panel-2);overflow:hidden;border:1px solid var(--line)}
    .bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#0a2540,#06b6d4)}
    .bar-num{font-size:12px;color:var(--muted);text-align:left;direction:ltr}

    /* ── RECENT LIST ── */
    .recent-list{display:flex;flex-direction:column;gap:0}
    .recent-item{
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;padding:11px 0;border-bottom:1px solid var(--line);
    }
    .recent-item:last-child{border-bottom:none}
    .recent-main{min-width:0;display:flex;gap:11px;align-items:flex-start}
    .recent-emoji{
      width:40px;height:40px;border-radius:12px;background:var(--panel-2);
      display:grid;place-items:center;flex-shrink:0;font-size:19px;
      border:1px solid var(--line);
    }
    .recent-name{font-weight:700;font-size:14px;margin:0}
    .recent-meta{color:var(--muted);font-size:11px;margin-top:3px;line-height:1.6}

    /* ── SCANNER ── */
    .scanner-layout{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:start}
    .scanner-box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
    .video-wrap{
      position:relative;background:#020617;border-radius:16px;overflow:hidden;
      aspect-ratio:4/3;margin-bottom:14px;border:1px solid var(--line);
    }
    #scannerVideo{width:100%;height:100%;object-fit:cover;display:block}
    .scanner-overlay{
      position:absolute;inset:14%;
      border:2px solid rgba(255,255,255,.85);border-radius:16px;
      box-shadow:0 0 0 9999px rgba(2,6,23,.22);pointer-events:none;
    }
    .scan-line-anim{
      position:absolute;left:14%;right:14%;height:2px;
      background:linear-gradient(90deg,transparent,#22c55e,transparent);
      animation:scanmove 2s ease-in-out infinite;top:20%;
    }
    @keyframes scanmove{0%{top:14%;opacity:0}20%{opacity:1}80%{opacity:1}100%{top:86%;opacity:0}}

    /* ── DETAIL ── */
    .detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .detail{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
    .detail .k{color:var(--muted);font-size:11px;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
    .detail .v{font-weight:700;font-size:14px;line-height:1.5;word-break:break-word}
    .detail.full{grid-column:1/-1}

    /* ── MODAL ── */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(15,23,42,.55);
      display:none;align-items:flex-start;justify-content:center;
      padding:30px 20px;z-index:999;overflow-y:auto;
    }
    .modal-overlay.show{display:flex}
    .modal{
      background:var(--panel);border-radius:22px;width:min(1050px,100%);
      max-height:none;overflow:visible;
      box-shadow:var(--shadow-lg);border:1px solid var(--line);
      margin:auto;
    }
    .modal-header{
      padding:18px 20px;border-bottom:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      border-radius:22px 22px 0 0;background:var(--panel);
    }
    .modal-header h3{margin:0;font-size:16px;font-weight:700}
    .modal-body{padding:20px}
    .modal-footer{
      padding:14px 20px 18px;display:flex;justify-content:flex-start;
      gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);
      border-radius:0 0 22px 22px;background:var(--panel);
    }

    /* ── FORM ── */
    .form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .field.full{grid-column:1/-1}
    .field.l2{grid-column:span 2}
    .hint{font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px}

    /* ── MAINTENANCE ── */
    .maint-item{
      background:var(--panel);border:1px solid var(--line);border-radius:14px;
      padding:14px 16px;display:flex;align-items:flex-start;gap:12px;
      margin-bottom:8px;transition:.15s ease;
    }
    .maint-item:hover{box-shadow:var(--shadow)}
    .maint-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
    .maint-dot.overdue{background:#ef4444}
    .maint-dot.upcoming{background:#f59e0b}
    .maint-dot.ok{background:#22c55e}
    .maint-info{flex:1;min-width:0}
    .maint-title{font-size:14px;font-weight:600;margin-bottom:3px}
    .maint-sub{font-size:12px;color:var(--muted);line-height:1.6}
    .maint-date{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600}

    /* ── HISTORY ── */
    .history-item{
      display:flex;gap:12px;padding:10px 0;
      border-bottom:1px solid var(--line);font-size:13px;
    }
    .history-item:last-child{border-bottom:none}
    .history-time{color:var(--muted);font-size:11px;white-space:nowrap;padding-top:2px}
    .history-dot{width:8px;height:8px;border-radius:50%;background:var(--brand-2);flex-shrink:0;margin-top:5px}

    /* ── PRINT ── */
    .print-area{background:var(--panel);border:1px dashed var(--line);border-radius:16px;padding:16px}

    /* ── WARRANTY ALERT ── */
    .warranty-alert{
      background:linear-gradient(135deg,#fff6df,#fef3c7);
      border:1px solid #fbbf24;border-radius:14px;
      padding:14px 16px;display:flex;align-items:center;gap:12px;
      margin-bottom:10px;
    }
    [data-theme="dark"] .warranty-alert{background:linear-gradient(135deg,#2d1f00,#3d2800);border-color:#f59e0b}

    /* ── TOAST ── */
    .toast{
      position:fixed;left:20px;bottom:20px;
      background:#0f172a;color:#fff;
      padding:12px 16px;border-radius:13px;
      box-shadow:0 16px 40px rgba(0,0,0,.2);
      transform:translateY(120%);opacity:0;
      transition:.25s ease;z-index:10000;
      max-width:min(92vw,400px);font-size:13px;line-height:1.6;
    }
    [data-theme="dark"] .toast{background:#e6edf3;color:#0d1117}
    .toast.show{transform:translateY(0);opacity:1}

    /* ── IMPORT DROP ── */
    .drop-zone{
      border:2px dashed var(--line);border-radius:14px;
      padding:28px;text-align:center;cursor:pointer;
      transition:.2s ease;color:var(--muted);
    }
    .drop-zone:hover,.drop-zone.drag-over{border-color:var(--brand-2);background:rgba(29,78,216,.04)}

    /* ── EMPTY ── */
    .empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}

    /* ── CHART CONTAINER ── */
    .chart-container{position:relative;height:220px;width:100%}

    /* ── RESPONSIVE ── */
    @media(max-width:1200px){
      .layout{grid-template-columns:1fr}
      .sidebar{height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:14px 16px}
      .brand{border-bottom:none;padding-bottom:0;margin-bottom:0}
      .nav{flex-direction:row;margin-top:0;flex:none}
      .nav button{padding:8px 12px;font-size:12px}
      .sidebar-footer{display:none}
      .grid.metrics{grid-template-columns:repeat(3,minmax(0,1fr))}
      .grid.two,.scanner-layout{grid-template-columns:1fr}
      .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .toolbar{grid-template-columns:1fr 1fr}
    }
    @media(max-width:720px){
      .main{padding:12px}
      .topbar{flex-direction:column;align-items:stretch}
      .grid.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
      .form-grid{grid-template-columns:1fr}
      .field.l2{grid-column:span 1}
      .toolbar{grid-template-columns:1fr}
      .detail-grid{grid-template-columns:1fr}
      .bar-row{grid-template-columns:90px 1fr 60px}
    }

    @media print{
      .sidebar,.topbar,.top-actions,.modal-footer,.nav,
      .icon-btn,.btn:not(.print-keep){display:none!important}
      .layout{grid-template-columns:1fr}
      .main{padding:0}
      .card{box-shadow:none;border-radius:0;border:none}
    }
  </style>
</head>
<body>
  <div id="loginScreen" style="
position:fixed;inset:0;
background:#0a2540;
display:flex;align-items:center;justify-content:center;
z-index:9999;
">

  <div style="
    background:#fff;
    padding:30px;
    border-radius:16px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2)
  ">
    <h2 style="margin-bottom:20px">Login</h2>

    <input id="loginUser" placeholder="Username"
      style="width:100%;margin-bottom:10px;padding:10px;border:1px solid #ccc;border-radius:8px">

    <input id="loginPass" type="password" placeholder="Password"
      style="width:100%;margin-bottom:15px;padding:10px;border:1px solid #ccc;border-radius:8px">

    <button onclick="doLogin()" style="
      width:100%;
      padding:10px;
      background:#1d4ed8;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      Login
    </button>
  </div>

</div>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-badge">B</div>
      <div>
        <h1>Bevatel Asset Hub</h1>
        <p>نظام إدارة الأصول</p>
      </div>
    </div>
    <div class="nav">
      <button data-view="dashboard" class="active" onclick="go('dashboard')">📊 Dashboard</button>

function loadFromStorage(key, fallback){
  try{
    const s = localStorage.getItem(key);
    if(!s) { localStorage.setItem(key, JSON.stringify(fallback)); return JSON.parse(JSON.stringify(fallback)); }
    const p = JSON.parse(s);
    return Array.isArray(p) ? p : JSON.parse(JSON.stringify(fallback));
  }catch(e){ return JSON.parse(JSON.stringify(fallback)); }
}

function esc(v){ return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;"); }

function fmtCurrency(v){
  const n = Number(v||0);
  return new Intl.NumberFormat('ar-EG',{style:'currency',currency:'EGP',maximumFractionDigits:0}).format(n);
}

function fmtDate(d){
  if(!d) return '-';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return new Intl.DateTimeFormat('ar-EG',{day:'2-digit',month:'short',year:'numeric'}).format(dt);
}

function statusClass(s){ return `status-${String(s||'').toLowerCase().replace(/\s+/g,'-')}`; }
function condClass(s){ return `condition-${String(s||'').toLowerCase()}`; }
function catIcon(c){ return CATEGORY_ICONS[c]||'📦'; }

function nextCode(){

}
function nextMaintId(){

}

function getFiltered(){
  let list=[...assets];
  const q=filters.search.trim().toLowerCase();
  if(q) list=list.filter(a=>[a.code,a.name,a.category,a.model,a.department,a.custodian,a.location,a.serial,a.status,a.condition,a.supplier,a.notes].join(' ').toLowerCase().includes(q));
  if(filters.category!=='all') list=list.filter(a=>a.category===filters.category);
  if(filters.status!=='all') list=list.filter(a=>a.status===filters.status);
  switch(filters.sort){
    case 'code-asc':  list.sort((a,b)=>String(a.code).localeCompare(String(b.code))); break;
    case 'name-asc':  list.sort((a,b)=>String(a.name).localeCompare(String(b.name))); break;
    case 'value-desc':list.sort((a,b)=>Number(b.value||0)-Number(a.value||0)); break;
    default:          list.sort((a,b)=>new Date(b.updatedAt||b.createdAt||0)-new Date(a.updatedAt||a.createdAt||0));
  }
  return list;
}

          <th>الحالة</th><th>Barcode</th><th>QR</th><th>السيريال</th><th>القيمة</th><th>الضمان</th><th>إجراءات</th>
        </tr></thead>
        <tbody id="assetsTbody"></tbody>
      </table></div>
    </div>`;

}

function renderAssetsTable(){
  const list=getFiltered();
  const tbody=document.getElementById('assetsTbody');
  const cnt=document.getElementById('assetsCount');
  if(cnt) cnt.textContent=`${list.length} أصل`;
  if(!tbody) return;
  if(!list.length){ tbody.innerHTML=`<tr><td colspan="12"><div class="empty">لا توجد نتائج</div></td></tr>`; return; }

  const now=new Date();
  tbody.innerHTML=list.map(a=>{
    const wEnd=a.warrantyEnd?new Date(a.warrantyEnd):null;
    const wExpired=wEnd&&wEnd<now;
    const wSoon=wEnd&&!wExpired&&(wEnd-now)<60*24*60*60*1000;
    return `<tr>
      <td><div class="id">${esc(a.code)}</div><div class="subtext">${fmtDate(a.createdAt)}</div></td>
      <td><div style="font-weight:700">${esc(a.name)}</div><div class="subtext">${esc(a.model||'-')}</div></td>
      <td>${catIcon(a.category)} ${esc(a.category)}</td>
      <td>${esc(a.department)}</td>
      <td>${esc(a.custodian)}</td>
      <td>
        <span class="badge ${statusClass(a.status)}">${esc(a.status)}</span>
        <div style="height:4px"></div>
        <span class="badge ${condClass(a.condition)}">${esc(a.condition)}</span>
      </td>
      <td><div class="barcode-cell"><svg id="bc-${esc(a.code)}"></svg></div></td>
      <td><canvas id="qr-${esc(a.code)}" width="60" height="60" style="border-radius:6px;border:1px solid var(--line)"></canvas></td>
      <td class="id">${esc(a.serial||'-')}</td>
      <td style="font-weight:700">${fmtCurrency(a.value)}</td>
      <td>
        ${wExpired?`<span class="badge status-retired">منتهي</span>`:wSoon?`<span class="badge status-maintenance">قريباً</span>`:`<span style="font-size:12px;color:var(--muted)">${fmtDate(a.warrantyEnd)}</span>`}
      </td>
      <td>
        <div class="actions">
          <button class="icon-btn primary" title="تفاصيل" onclick="openDetails('${esc(a.code)}')">👁</button>
          <button class="icon-btn success" title="تعديل" onclick="openAssetForm('${esc(a.code)}')">✏️</button>
          <button class="icon-btn warn" title="طباعة" onclick="printLabel('${esc(a.code)}')">🖨️</button>
          <button class="icon-btn" title="سجل" onclick="openHistory('${esc(a.code)}')">📜</button>
          <button class="icon-btn danger" title="حذف" onclick="deleteAsset('${esc(a.code)}')">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  requestAnimationFrame(()=>{
    list.forEach(a=>{
      const svg=document.getElementById(`bc-${a.code}`);
      if(svg){ try{ JsBarcode(svg,a.code,{format:'CODE128',lineColor:'#0f172a',background:'#ffffff',width:1.1,height:36,displayValue:false,margin:0}); }catch(e){} }
      const canvas=document.getElementById(`qr-${a.code}`);
      if(canvas){ try{ QRCode.toCanvas(canvas,a.code,{width:60,margin:1,color:{dark:'#0f172a',light:'#ffffff'}}); }catch(e){} }
    });
  });
}

          </div>

        </div>
        <div class="modal-footer">

function saveAsset(){
  const get=id=>document.getElementById(id)?.value?.trim()||'';
  const code=get('fCode'), name=get('fName'), cat=get('fCat'), dept=get('fDept'), cust=get('fCust'), loc=get('fLoc');
  if(!name||!cat||!dept||!cust||!loc){ showToast('⚠ املأ الحقول الإلزامية'); return; }
  const obj={
    code, name, category:cat, model:get('fModel'), department:dept, custodian:cust, location:loc,
    serial:get('fSerial'), status:get('fStatus'), condition:get('fCond'),
    purchaseDate:get('fPDate'), value:Number(get('fVal')||0), supplier:get('fSupp'),
    warrantyEnd:get('fWarr'), notes:get('fNotes'), updatedAt:new Date().toISOString()
  };
  if(editMode){
    const idx=assets.findIndex(a=>a.code===editingCode);
    if(idx===-1){ showToast('الأصل غير موجود'); return; }
    const old=assets[idx];
    history.unshift({assetCode:code,action:'edit',details:`تم تعديل البيانات`,oldStatus:old.status,newStatus:obj.status,by:'المستخدم',at:new Date().toISOString()});
    assets[idx]={...old,...obj};
    showToast(`✅ تم تحديث ${code}`);
  } else {
    obj.createdAt=new Date().toISOString();
    assets.unshift(obj);
    history.unshift({assetCode:code,action:'add',details:'تمت إضافة الأصل',by:'المستخدم',at:new Date().toISOString()});
    showToast(`✅ تمت إضافة ${code}`);
  }
  save(); closeModal(); renderView();
}

function renderMaintenance(){
  setPageInfo('الصيانة','جدولة، متابعة، وإغلاق مهام الصيانة');
  const now=new Date();
  const overdue=maintenance.filter(m=>m.status!=='done'&&new Date(m.scheduledDate)<now);
  const upcoming=maintenance.filter(m=>m.status!=='done'&&new Date(m.scheduledDate)>=now);
  const done=maintenance.filter(m=>m.status==='done');

  document.getElementById('app').innerHTML=`
    <div class="grid metrics" style="grid-template-columns:repeat(3,1fr)">
      <div class="metric"><div class="value" style="color:#ef4444">${overdue.length}</div><div class="label">متأخرة</div><div class="sub">تحتاج تدخل فوري</div></div>
      <div class="metric"><div class="value" style="color:#f59e0b">${upcoming.length}</div><div class="label">مجدولة</div><div class="sub">قادمة</div></div>
      <div class="metric"><div class="value" style="color:#22c55e">${done.length}</div><div class="label">مكتملة</div><div class="sub">تم إغلاقها</div></div>
    </div>
    <div class="card">
      <div class="section-title">
        <h3>مهام الصيانة</h3>
        <button class="btn primary" onclick="openMaintForm()">＋ مهمة جديدة</button>
      </div>
      ${maintenance.length===0?'<div class="empty">لا توجد مهام صيانة</div>':
      [...maintenance].sort((a,b)=>{
        const order={overdue:0,upcoming:1,done:2};
        return (order[a.status]||1)-(order[b.status]||1);
      }).map(m=>`
      <div class="maint-item">
        <div class="maint-dot ${m.status==='done'?'ok':m.status==='overdue'?'overdue':'upcoming'}"></div>
        <div class="maint-info">
          <div class="maint-title">${esc(m.type)}</div>
          <div class="maint-sub">
            ${esc(m.assetCode)} · ${esc(m.assetName)}<br>
            فني: ${esc(m.technician||'-')} · التكلفة: ${fmtCurrency(m.cost||0)}
            ${m.notes?` · ${esc(m.notes)}`:''}
          </div>
        </div>
        <div style="text-align:left;flex-shrink:0">
          <div class="maint-date">${fmtDate(m.scheduledDate)}</div>
          <div style="height:6px"></div>
          <div style="display:flex;gap:6px;justify-content:flex-end">
            ${m.status!=='done'?`<button class="btn success" style="padding:6px 10px;font-size:12px" onclick="completeMaint('${esc(m.id)}')">✓ تم</button>`:''}
            <button class="btn danger" style="padding:6px 10px;font-size:12px" onclick="deleteMaint('${esc(m.id)}')">🗑</button>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
}

            <div class="field"><label>تاريخ الصيانة *</label><input id="mDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
            <div class="field"><label>الفني</label><input id="mTech" placeholder="اسم الفني أو الشركة"></div>
            <div class="field"><label>التكلفة (جنيه)</label><input id="mCost" type="number" min="0" placeholder="0"></div>
            <div class="field"><label>الحالة</label><select id="mStatus"><option value="upcoming">مجدولة</option><option value="overdue">متأخرة</option><option value="done">مكتملة</option></select></div>
            <div class="field full"><label>ملاحظات</label><textarea id="mNotes" placeholder="أي تفاصيل إضافية..."></textarea></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn ghost" onclick="closeModal()">إلغاء</button>
          <button class="btn primary" onclick="saveMaint()">💾 حفظ</button>
        </div>
      </div>
    </div>`;
}

function saveMaint(){
  const ac=document.getElementById('mAsset')?.value;
  const tp=document.getElementById('mType')?.value?.trim();
  const dt=document.getElementById('mDate')?.value;
  if(!ac||!tp||!dt){ showToast('⚠ اختر الأصل واكتب نوع الصيانة والتاريخ'); return; }
  const asset=assets.find(a=>a.code===ac);
  maintenance.unshift({
    id:nextMaintId(), assetCode:ac, assetName:asset?.name||ac,
    type:tp, scheduledDate:dt,
    completedDate:document.getElementById('mStatus')?.value==='done'?dt:null,
    status:document.getElementById('mStatus')?.value||'upcoming',
    technician:document.getElementById('mTech')?.value?.trim()||'',
    cost:Number(document.getElementById('mCost')?.value||0),
    notes:document.getElementById('mNotes')?.value?.trim()||''
  });
  save(); closeModal(); renderView(); showToast('✅ تمت جدولة الصيانة');
}

function completeMaint(id){
  const m=maintenance.find(x=>x.id===id);
  if(!m) return;
  m.status='done'; m.completedDate=new Date().toISOString().slice(0,10);
  save(); renderView(); showToast('✅ تم إغلاق مهمة الصيانة');
}

function deleteMaint(id){
  if(!confirm('حذف هذه المهمة؟')) return;
  maintenance=maintenance.filter(m=>m.id!==id);
  save(); renderView(); showToast('تم الحذف');
}

/* ════════════════════════════════════════════════
   SCANNER
════════════════════════════════════════════════ */
function renderScanner(){
  setPageInfo('Scanner','امسح الباركود أو ابحث يدوياً بالكود');
  document.getElementById('app').innerHTML=`
    <div class="scanner-layout">
      <div class="card scanner-box">
        <div class="section-title"><h3>مسح بالكاميرا</h3><span>Barcode / QR</span></div>
        <div class="video-wrap">
          <video id="scannerVideo" autoplay muted playsinline></video>
          <div class="scanner-overlay"></div>
          <div class="scan-line-anim"></div>
        </div>
        <div class="top-actions" style="justify-content:flex-start;margin-bottom:10px">
          <button class="btn primary" onclick="startScanner()">▶ بدء المسح</button>
          <button class="btn ghost" onclick="stopScanner()">⏹ إيقاف</button>
        </div>
        <div style="font-size:12px;color:var(--muted);line-height:1.7">المسح يعتمد كود الأصل AST-XXXX. يشتغل على HTTPS من الموبايل.</div>
      </div>
      <div class="card">
        <div class="section-title"><h3>بحث يدوي</h3><span>Asset code / serial</span></div>
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <input id="scanInput" type="text" placeholder="AST-0001 أو Serial Number" dir="ltr" style="flex:1" onkeydown="if(event.key==='Enter')findAsset(this.value)">
          <button class="btn primary" onclick="findAsset(document.getElementById('scanInput').value)">بحث</button>
        </div>
        <div id="scanResult"><div class="empty">النتيجة ستظهر هنا بعد المسح أو البحث.</div></div>
      </div>
    </div>`;
}

async function startScanner(){
  stopScanner();
  const result=document.getElementById('scanResult');
  if(!window.ZXing||!ZXing.BrowserMultiFormatReader){ if(result) result.innerHTML='<div class="empty">مكتبة المسح لم تُحمّل.</div>'; return; }
  const reader=new ZXing.BrowserMultiFormatReader();
  if(result) result.innerHTML='<div class="empty">جاري فتح الكاميرا...</div>';
  try{
    scannerControls=await reader.decodeFromVideoDevice(null,'scannerVideo',(res)=>{
      if(res){ const v=document.getElementById('scanInput'); if(v) v.value=res.getText(); findAsset(res.getText()); }
    });
  }catch(e){ if(result) result.innerHTML='<div class="empty">تعذر تشغيل الكاميرا.<br>تأكد من HTTPS والسماح للكاميرا.</div>'; }
}

function stopScanner(){
  try{ if(scannerControls&&typeof scannerControls.stop==='function') scannerControls.stop(); }catch(e){}
  scannerControls=null;
}

function findAsset(val){
  const q=String(val||'').trim();
  const box=document.getElementById('scanResult');
  if(!q){ if(box) box.innerHTML='<div class="empty">اكتب كود أو سيريال أولاً.</div>'; return; }
  const a=assets.find(x=>String(x.code).toLowerCase()===q.toLowerCase()||String(x.serial||'').toLowerCase()===q.toLowerCase());
  if(!box) return;
  if(!a){ box.innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:8px">❌</div><div style="font-weight:700;color:#ef4444">لم يتم العثور على الأصل</div><div class="muted" style="margin-top:6px" dir="ltr">${esc(q)}</div></div>`; return; }
  box.innerHTML=`
    <div class="section-title"><h3>✅ تم العثور على الأصل</h3><span class="badge ${statusClass(a.status)}">${esc(a.status)}</span></div>
    <div style="text-align:center;margin-bottom:14px">
      <div class="barcode-cell" style="display:inline-block;width:100%;max-width:280px"><svg id="scanBC"></svg></div>
      <div style="margin-top:10px"><canvas id="scanQR"></canvas></div>
    </div>
    <div class="detail-grid">
      <div class="detail"><div class="k">كود الأصل</div><div class="v" dir="ltr">${esc(a.code)}</div></div>
      <div class="detail"><div class="k">الاسم</div><div class="v">${esc(a.name)}</div></div>
      <div class="detail"><div class="k">الفئة</div><div class="v">${catIcon(a.category)} ${esc(a.category)}</div></div>
      <div class="detail"><div class="k">المسؤول</div><div class="v">${esc(a.custodian)}</div></div>
      <div class="detail"><div class="k">القسم</div><div class="v">${esc(a.department)}</div></div>
      <div class="detail"><div class="k">القيمة</div><div class="v">${fmtCurrency(a.value)}</div></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn success" onclick="openDetails('${esc(a.code)}')">فتح التفاصيل</button>
      <button class="btn primary" onclick="openAssetForm('${esc(a.code)}')">تعديل</button>
      <button class="btn warn" onclick="printLabel('${esc(a.code)}')">🖨️ طباعة</button>
    </div>`;
  requestAnimationFrame(()=>{
    const svg=document.getElementById('scanBC');
    if(svg){ try{ JsBarcode(svg,a.code,{format:'CODE128',lineColor:'#0f172a',background:'#ffffff',width:1.5,height:56,displayValue:true,fontSize:14,margin:2}); }catch(e){} }
    const qr=document.getElementById('scanQR');
    if(qr){ try{ QRCode.toCanvas(qr,a.code,{width:80,margin:1,color:{dark:'#0f172a',light:'#ffffff'}}); }catch(e){} }
  });
}

/* ════════════════════════════════════════════════
   IMPORT CSV
════════════════════════════════════════════════ */
function openImport(){
  document.getElementById('modalRoot').innerHTML=`
    <div class="modal-overlay show">
      <div class="modal" style="max-width:520px">
        <div class="modal-header"><h3>استيراد CSV</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
          <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvFile').click()" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event)">
            <div style="font-size:36px;margin-bottom:10px">📂</div>
            <div style="font-weight:700;margin-bottom:6px">اضغط لاختيار ملف CSV</div>
            <div style="font-size:12px;color:var(--muted)">أو اسحب الملف هنا</div>
          </div>
          <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCSVFile(this.files[0])">
          <div class="hint" style="margin-top:12px">
            الأعمدة المطلوبة: code, name, category, department, custodian, location<br>
            الأعمدة الاختيارية: model, serial, status, condition, value, supplier, warrantyEnd, purchaseDate, notes<br>
            <strong>ملاحظة:</strong> الأصول الموجودة بنفس الكود سيتم تحديثها.
          </div>
          <div id="importPreview"></div>
        </div>
        <div class="modal-footer">
          <button class="btn ghost" onclick="closeModal()">إلغاء</button>
          <button class="btn primary" id="importBtn" style="display:none" onclick="confirmImport()">✅ استيراد</button>
        </div>
      </div>
    </div>`;
  window._importData=null;
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropZone')?.classList.remove('drag-over');
  const file=e.dataTransfer?.files?.[0];
  if(file) handleCSVFile(file);
}

function handleCSVFile(file){
  if(!file) return;
  Papa.parse(file,{header:true,skipEmptyLines:true,complete:(result)=>{
    const rows=result.data;
    window._importData=rows;
    const prev=document.getElementById('importPreview');
    const btn=document.getElementById('importBtn');
    if(prev){
      prev.innerHTML=`<div style="margin-top:14px;font-weight:700;font-size:13px">معاينة (${rows.length} صف):</div>
      <div class="table-wrap" style="margin-top:8px;max-height:200px;overflow:auto"><table>
        <thead><tr>${Object.keys(rows[0]||{}).map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,5).map(r=>`<tr>${Object.values(r).map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
    }
    if(btn) btn.style.display='inline-flex';
  }});
}

function confirmImport(){
  const rows=window._importData;
  if(!rows||!rows.length){ showToast('لا توجد بيانات للاستيراد'); return; }
  let added=0, updated=0;
  rows.forEach(r=>{
    if(!r.name||!r.category||!r.department||!r.custodian) return;
    const code=r.code||nextCode();
    const obj={
      code, name:r.name, category:r.category, model:r.model||'',
      department:r.department, custodian:r.custodian, location:r.location||'',
      serial:r.serial||'', status:r.status||'Active', condition:r.condition||'Good',
      purchaseDate:r.purchaseDate||'', value:Number(r.value||0),
      supplier:r.supplier||'', warrantyEnd:r.warrantyEnd||'', notes:r.notes||'',
      updatedAt:new Date().toISOString(), createdAt:r.createdAt||new Date().toISOString()
    };
    const idx=assets.findIndex(a=>a.code===code);
    if(idx>=0){ assets[idx]={...assets[idx],...obj}; updated++; }
    else{ assets.unshift(obj); added++; }
  });
  save(); closeModal(); renderView();
  showToast(`✅ تم استيراد ${added} أصل جديد + تحديث ${updated}`);
}

/* ════════════════════════════════════════════════
   DELETE ASSET
════════════════════════════════════════════════ */
function deleteAsset(code){
  if(!confirm(`حذف الأصل ${code} نهائياً؟`)) return;
  history.unshift({assetCode:code,action:'delete',details:'تم حذف الأصل',by:'المستخدم',at:new Date().toISOString()});
  assets=assets.filter(a=>a.code!==code);
  maintenance=maintenance.filter(m=>m.assetCode!==code);
  save(); closeModal(); renderView(); showToast(`تم حذف ${code}`);
}

/* ════════════════════════════════════════════════
   EXPORT
════════════════════════════════════════════════ */
function exportCSV(){
  if(!assets.length){ showToast('لا توجد بيانات'); return; }
  const h=['code','name','category','model','department','custodian','location','serial','status','condition','purchaseDate','value','supplier','warrantyEnd','notes','createdAt','updatedAt'];
  const ec=v=>`"${String(v??'').replaceAll('"','""')}"`;
  const rows=[h.join(','),...assets.map(a=>h.map(k=>ec(a[k])).join(','))];
  const b=new Blob(['\ufeff'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(b);
  const l=document.createElement('a'); l.href=url; l.download='bevatel-assets.csv'; l.click();
  URL.revokeObjectURL(url); showToast('تم تصدير CSV');
}

function exportJSON(){
  if(!assets.length){ showToast('لا توجد بيانات'); return; }
  const b=new Blob([JSON.stringify(assets,null,2)],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(b);
  const l=document.createElement('a'); l.href=url; l.download='bevatel-assets.json'; l.click();
  URL.revokeObjectURL(url); showToast('تم تصدير JSON');
}

function seedDemo(){
  if(!confirm('استبدال البيانات بالداتا التجريبية؟')) return;
  assets=JSON.parse(JSON.stringify(DEMO_ASSETS));
  maintenance=JSON.parse(JSON.stringify(DEMO_MAINTENANCE));
  save(); renderView(); showToast('تم تحميل الداتا التجريبية');
}

function clearAll(){
  if(!confirm('مسح كل الأصول والصيانة نهائياً؟')) return;
  assets=[]; maintenance=[]; history=[];
  save(); renderView(); showToast('تم مسح كل البيانات');
}
