<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset System</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px #ddd}
input,select{padding:10px;width:100%;margin:5px 0;border:1px solid #ccc;border-radius:5px}
button{padding:10px;border:none;border-radius:5px;cursor:pointer}
.primary{background:#0a2540;color:#fff}
.asset{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}
.login{display:none}
.app{display:none}
#reader{margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login container">
<div class="card">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div class="app container">

<h2>Asset System</h2>

<button class="primary" onclick="showForm()">+ Add</button>
<button onclick="startQR()">📷 Scan</button>

<div id="reader"></div>

<div id="form" style="display:none">
<input id="name" placeholder="Name">
<select id="cat">
<option>مكتب</option>
<option>كرسي</option>
</select>
<input id="userF" placeholder="Employee">
<input id="serial" placeholder="Serial">
<button class="primary" onclick="save()">Save</button>
</div>

<h3>Assets</h3>
<div id="list"></div>

</div>

<script>

// LOGIN
if(localStorage.getItem("login")=="true"){
 document.querySelector(".app").style.display="block";
}else{
 document.querySelector(".login").style.display="block";
}

function login(){
 if(user.value=="admin" && pass.value=="1234"){
  localStorage.setItem("login","true");
  location.reload();
 }else alert("Wrong");
}

// DATA
let assets = JSON.parse(localStorage.getItem("assets")||"[]");
let editId=null;

// RENDER
function render(){
 list.innerHTML="";
 assets.forEach(a=>{
  list.innerHTML+=`
  <div class="asset">
   <div>
    <b>${a.name}</b><br>
    ${a.cat} - ${a.user}<br>
    ${a.serial}
   </div>
   <div>
    <button onclick="edit('${a.id}')">✏️</button>
    <button onclick="del('${a.id}')">🗑</button>
    <button onclick="printAsset('${a.id}')">🖨</button>
   </div>
  </div>`;
 });
}
render();

// FORM
function showForm(){
 form.style.display="block";
}

// SAVE
function save(){
 if(editId){
  let a=assets.find(x=>x.id==editId);
  a.name=name.value;
  a.cat=cat.value;
  a.user=userF.value;
  a.serial=serial.value;
  editId=null;
 }else{
  assets.push({
   id:"ID"+Date.now(),
   name:name.value,
   cat:cat.value,
   user:userF.value,
   serial:serial.value
  });
 }
 localStorage.setItem("assets",JSON.stringify(assets));
 form.style.display="none";
 render();
}

// EDIT
function edit(id){
 let a=assets.find(x=>x.id==id);
 name.value=a.name;
 cat.value=a.cat;
 userF.value=a.user;
 serial.value=a.serial;
 editId=id;
 form.style.display="block";
}

// DELETE
function del(id){
 assets=assets.filter(x=>x.id!=id);
 localStorage.setItem("assets",JSON.stringify(assets));
 render();
}

// PRINT (مفيهوش bug)
function printAsset(id){
 let a=assets.find(x=>x.id==id);

 let w=window.open("");
 w.document.write(`
 <html>
 <head>
 <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
 </head>
 <body style="font-family:Arial;text-align:center">

 <h2>Bevatel</h2>

 <div id="qr"></div>

 <p>${a.id}</p>
 <p>${a.name}</p>
 <p>${a.cat}</p>
 <p>${a.user}</p>

 <button onclick="window.print()">Print</button>

 <script>
 new QRCode(document.getElementById("qr"), "${a.id}");
 <\/script>

 </body>
 </html>
 `);
}

// QR SCAN
function startQR(){
 const qr = new Html5Qrcode("reader");
 qr.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  (txt)=>{
   alert("Scanned: "+txt);
   qr.stop();
  }
 );
}

</script>

</body>
</html>
