<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bevatel Asset Management</title>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    :root{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --panel-2:#f8fafc;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5eaf2;
      --brand:#0a2540;
      --brand-2:#1d4ed8;
      --accent:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
      --info:#06b6d4;
      --shadow:0 10px 30px rgba(15, 23, 42, .08);
      --radius:18px;
      --radius-sm:12px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#eef3fb 0%, #f7f9fc 100%);
      color:var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      direction: rtl;
    }

    .layout{
      display:grid;
      grid-template-columns: 280px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:linear-gradient(180deg, var(--brand) 0%, #07192e 100%);
      color:#fff;
      padding:22px 18px;
      position:sticky;
      top:0;
      height:100vh;
      overflow:auto;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      padding-bottom:18px;
      margin-bottom:18px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .brand-badge{
      width:44px;height:44px;
      border-radius:14px;
      background:linear-gradient(135deg, #22c55e, #06b6d4);
      display:grid;
      place-items:center;
      font-weight:800;
      color:#fff;
      box-shadow:0 12px 24px rgba(6,182,212,.25);
      flex-shrink:0;
    }

    .brand h1{
      margin:0;
      font-size:16px;
      line-height:1.2;
    }

    .brand p{
      margin:4px 0 0;
      color:rgba(255,255,255,.68);
      font-size:12px;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }

    .nav button{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:#e5eefb;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      text-align:right;
      cursor:pointer;
      transition:.18s ease;
    }
    .nav button:hover{
      background:rgba(255,255,255,.09);
      transform:translateY(-1px);
    }
    .nav button.active{
      background:#fff;
      color:var(--brand);
      border-color:#fff;
      box-shadow:0 10px 25px rgba(0,0,0,.12);
      font-weight:700;
    }

    .sidebar-footer{
      margin-top:22px;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.7;
    }

    .main{
      padding:22px;
      min-width:0;
    }

    .topbar{
      background:rgba(255,255,255,.8);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,.6);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
    }

    .page-head h2{
      margin:0;
      font-size:22px;
      line-height:1.3;
    }
    .page-head p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      background:#eaf0f7;
      color:var(--text);
      padding:11px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      transition:.18s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px); filter:brightness(.98);}
    .btn.primary{
      background:linear-gradient(135deg, var(--brand), var(--brand-2));
      color:#fff;
      box-shadow:0 10px 25px rgba(29,78,216,.18);
    }
    .btn.success{background:linear-gradient(135deg, #16a34a, #22c55e); color:#fff;}
    .btn.warn{background:linear-gradient(135deg, #d97706, #f59e0b); color:#fff;}
    .btn.danger{background:linear-gradient(135deg, #dc2626, #ef4444); color:#fff;}
    .btn.ghost{
      background:#fff;
      border:1px solid var(--line);
    }

    .content{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .grid{
      display:grid;
      gap:14px;
    }
    .grid.metrics{
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
    .grid.two{
      grid-template-columns: 1.2fr .8fr;
    }
    .grid.three{
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      min-width:0;
    }

    .metric{
      padding:18px;
      background:linear-gradient(180deg, #fff, #fbfcfe);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      min-width:0;
    }
    .metric .value{
      font-size:28px;
      font-weight:800;
      margin:0;
      letter-spacing:-.5px;
      color:var(--brand);
    }
    .metric .label{
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
    }
    .metric .sub{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .section-title h3{
      margin:0;
      font-size:16px;
    }
    .section-title span{
      color:var(--muted);
      font-size:12px;
    }

    .toolbar{
      display:grid;
      grid-template-columns: 1.3fr .7fr .7fr .7fr auto auto;
      gap:10px;
      align-items:center;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:12px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
      transition:.15s ease;
      font-family:inherit;
    }
    input:focus, select:focus, textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(59,130,246,.10);
    }
    textarea{resize:vertical; min-height:90px}

    .table-wrap{
      overflow:auto;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
      background:#fff;
    }
    thead th{
      position:sticky;
      top:0;
      background:#f8fbff;
      color:#475569;
      font-size:12px;
      font-weight:700;
      padding:13px 12px;
      border-bottom:1px solid var(--line);
      text-align:right;
      white-space:nowrap;
      z-index:2;
    }
    tbody td{
      padding:12px;
      border-bottom:1px solid #eef2f7;
      vertical-align:middle;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:260px;
    }
    tbody tr:hover{background:#fbfdff}

    .id{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      direction:ltr;
      font-size:12px;
      color:#334155;
      font-weight:700;
    }

    .subtext{
      font-size:12px;
      color:var(--muted);
      margin-top:3px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .status-active{background:#e8f8ee; color:#166534;}
    .status-maintenance{background:#fff6df; color:#9a6700;}
    .status-stored{background:#eef2f7; color:#475569;}
    .status-retired{background:#fdecec; color:#991b1b;}
    .status-lost{background:#ffe4e6; color:#9f1239;}

    .condition-new{background:#ecfeff; color:#155e75;}
    .condition-good{background:#e8f8ee; color:#166534;}
    .condition-fair{background:#fff6df; color:#9a6700;}
    .condition-poor{background:#fdecec; color:#991b1b;}

    .actions{
      display:flex;
      gap:8px;
      justify-content:flex-start;
      flex-wrap:wrap;
    }

    .icon-btn{
      width:34px;height:34px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      display:grid;
      place-items:center;
      background:#eef2f7;
      color:#0f172a;
      transition:.15s ease;
      flex-shrink:0;
    }
    .icon-btn:hover{transform:translateY(-1px); filter:brightness(.98);}
    .icon-btn.primary{background:#e0ebff; color:#1d4ed8;}
    .icon-btn.success{background:#e8f8ee; color:#166534;}
    .icon-btn.warn{background:#fff6df; color:#9a6700;}
    .icon-btn.danger{background:#fdecec; color:#991b1b;}

    .barcode{
      display:inline-block;
      background:#fff;
      border:1px solid #e9eef6;
      border-radius:10px;
      padding:6px 8px 2px;
      min-width:160px;
    }
    .barcode svg{
      width:100%;
      height:44px;
      display:block;
    }

    .bar-row{
      display:grid;
      grid-template-columns: 120px 1fr 56px;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
    }
    .bar-label{
      color:#334155;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .bar-track{
      height:10px;
      border-radius:999px;
      background:#eaf0f7;
      overflow:hidden;
    }
    .bar-fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, #1d4ed8, #06b6d4);
    }
    .bar-num{
      font-size:12px;
      color:var(--muted);
      text-align:left;
      direction:ltr;
    }

    .recent-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .recent-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid #eef2f7;
    }
    .recent-item:last-child{border-bottom:none}
    .recent-main{
      min-width:0;
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .recent-emoji{
      width:42px;height:42px;
      border-radius:14px;
      background:#f1f5f9;
      display:grid;
      place-items:center;
      flex-shrink:0;
      font-size:20px;
    }
    .recent-name{
      font-weight:700;
      font-size:14px;
      margin:0;
    }
    .recent-meta{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
      line-height:1.5;
    }

    .scanner-layout{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:18px;
      align-items:start;
    }
    .scanner-box{
      background:linear-gradient(180deg, #fff, #f8fbff);
      border:1px dashed #cfd8e6;
      border-radius:20px;
      padding:18px;
    }
    .video-wrap{
      position:relative;
      background:#020617;
      border-radius:18px;
      overflow:hidden;
      aspect-ratio: 4 / 3;
      margin-bottom:14px;
      border:1px solid #d8e2ef;
    }
    #scannerVideo{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .scanner-overlay{
      position:absolute;
      inset:14%;
      border:2px solid rgba(255,255,255,.82);
      border-radius:18px;
      box-shadow:0 0 0 9999px rgba(2,6,23,.20);
      pointer-events:none;
    }
    .scan-status{
      color:var(--muted);
      font-size:13px;
      margin-top:10px;
      line-height:1.7;
    }

    .detail-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:14px;
    }
    .detail{
      background:#f8fbff;
      border:1px solid #e7edf7;
      border-radius:14px;
      padding:12px 14px;
    }
    .detail .k{
      color:var(--muted);
      font-size:12px;
      margin-bottom:5px;
    }
    .detail .v{
      font-weight:700;
      font-size:14px;
      line-height:1.5;
      word-break:break-word;
    }
    .detail.full{grid-column:1 / -1}

    .muted{color:var(--muted)}
    .empty{
      padding:24px;
      text-align:center;
      color:var(--muted);
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(15, 23, 42, .52);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:999;
    }
    .modal-overlay.show{display:flex}

    .modal{
      background:#fff;
      border-radius:24px;
      width:min(1100px, 100%);
      max-height:min(92vh, 980px);
      overflow:auto;
      box-shadow:0 30px 80px rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.5);
    }
    .modal-header{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      position:sticky;
      top:0;
      background:#fff;
      z-index:1;
    }
    .modal-header h3{
      margin:0;
      font-size:17px;
    }
    .modal-body{padding:20px}
    .modal-footer{
      padding:16px 20px 20px;
      display:flex;
      justify-content:flex-start;
      gap:10px;
      flex-wrap:wrap;
      border-top:1px solid var(--line);
      background:#fff;
      position:sticky;
      bottom:0;
    }

    .form-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:12px;
    }
    .field{display:flex; flex-direction:column; gap:7px}
    .field label{
      font-size:12px;
      color:#475569;
      font-weight:700;
    }
    .field.full{grid-column:1 / -1}
    .field.l2{grid-column:span 2}
    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
      margin-top:8px;
    }

    .toast{
      position:fixed;
      left:20px;
      bottom:20px;
      background:#0f172a;
      color:#fff;
      padding:12px 14px;
      border-radius:14px;
      box-shadow:0 20px 40px rgba(0,0,0,.18);
      transform:translateY(120%);
      opacity:0;
      transition:.25s ease;
      z-index:1000;
      max-width:min(92vw, 420px);
      font-size:13px;
      line-height:1.6;
    }
    .toast.show{
      transform:translateY(0);
      opacity:1;
    }

    .print-area{
      background:#fff;
      border:1px dashed #dce5f1;
      border-radius:18px;
      padding:16px;
    }

    @media (max-width: 1200px){
      .layout{grid-template-columns:1fr}
      .sidebar{
        height:auto;
        position:relative;
      }
      .grid.metrics{grid-template-columns: repeat(3, minmax(0, 1fr));}
      .grid.two, .scanner-layout{grid-template-columns:1fr}
      .form-grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
      .toolbar{grid-template-columns:1fr 1fr 1fr 1fr}
    }

    @media (max-width: 720px){
      .main{padding:14px}
      .topbar{flex-direction:column; align-items:stretch}
      .grid.metrics{grid-template-columns: repeat(2, minmax(0, 1fr));}
      .form-grid{grid-template-columns:1fr}
      .field.l2{grid-column:span 1}
      .toolbar{grid-template-columns:1fr}
      .detail-grid{grid-template-columns:1fr}
      .bar-row{grid-template-columns: 96px 1fr 48px}
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">B</div>
        <div>
          <h1>Bevatel Asset Hub</h1>
          <p>نظام إدارة الأصول</p>
        </div>
      </div>

      <div class="nav">
        <button data-view="dashboard" class="active" onclick="go('dashboard')">📊 Dashboard</button>
        <button data-view="assets" onclick="go('assets')">🗂 الأصول</button>
        <button data-view="scanner" onclick="go('scanner')">📷 Scanner</button>
        <button data-view="reports" onclick="go('reports')">📈 التقارير</button>
      </div>

      <div class="sidebar-footer">
        شغال على GitHub Pages.<br>
        البيانات محفوظة على المتصفح بـ LocalStorage.<br>
        الكاميرا تحتاج HTTPS وتشتغل أفضل على الموبايل.
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="page-head">
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">نظرة سريعة على الأصول، الحالات، والفئات</p>
        </div>
        <div class="top-actions">
          <button class="btn primary" onclick="openAssetForm()">＋ إضافة أصل</button>
          <button class="btn ghost" onclick="exportCSV()">⬇ CSV</button>
          <button class="btn ghost" onclick="exportJSON()">⬇ JSON</button>
        </div>
      </div>

      <section id="app" class="content"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

    function loadAssets(){
      const saved = localStorage.getItem(STORAGE_KEY);
      if(!saved){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEMO_ASSETS));
        return [...DEMO_ASSETS];
      }
      try{
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [...DEMO_ASSETS];
      }catch(e){
        return [...DEMO_ASSETS];
      }
    }

      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatCurrency(value){
      const n = Number(value || 0);
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'SAR',
        maximumFractionDigits: 0
      }).format(n);
    }

    function formatDate(dateString){
      if(!dateString) return '-';
      const d = new Date(dateString);
      if(Number.isNaN(d.getTime())) return dateString;
      return new Intl.DateTimeFormat('ar-EG', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      }).format(d);
    }

    function statusClass(status){
      return `status-${String(status || '').toLowerCase().replace(/\s+/g, '-')}`;
    }

    function conditionClass(condition){
      return `condition-${String(condition || '').toLowerCase()}`;
    }

    function categoryIcon(category){
      return CATEGORY_ICONS[category] || '📦';
    }

    function nextAssetCode(){
      const nums = assets
        .map(a => String(a.code || '').replace(/\D/g, ''))
        .map(n => parseInt(n, 10))
        .filter(n => Number.isFinite(n));
      const next = nums.length ? Math.max(...nums) + 1 : 1;
      return `AST-${String(next).padStart(4, '0')}`;
    }

    function getFilteredAssets(){
      let list = [...assets];

      const q = filters.search.trim().toLowerCase();
      if(q){
        list = list.filter(a => {
          const hay = [
            a.code, a.name, a.category, a.model, a.department,
            a.custodian, a.location, a.serial, a.status, a.condition,
            a.supplier, a.notes
          ].join(' ').toLowerCase();
          return hay.includes(q);
        });
      }

      if(filters.category !== 'all'){
        list = list.filter(a => a.category === filters.category);
      }

      if(filters.status !== 'all'){
        list = list.filter(a => a.status === filters.status);
      }

      switch(filters.sort){
        case 'code-asc':
          list.sort((a,b) => String(a.code).localeCompare(String(b.code)));
          break;
        case 'name-asc':
          list.sort((a,b) => String(a.name).localeCompare(String(b.name)));
          break;
        case 'value-desc':
          list.sort((a,b) => Number(b.value || 0) - Number(a.value || 0));
          break;
        case 'updated-desc':
        default:
          list.sort((a,b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
          break;
      }
      return list;
    }

    function closeModal(){
      document.getElementById('modalRoot').innerHTML = '';
      editMode = false;
      editingCode = null;
    }

    function saveAsset(){
      const code = document.getElementById('assetCode').value.trim();
      const name = document.getElementById('assetName').value.trim();
      const category = document.getElementById('assetCategory').value;
      const model = document.getElementById('assetModel').value.trim();
      const department = document.getElementById('assetDepartment').value.trim();
      const custodian = document.getElementById('assetCustodian').value.trim();
      const location = document.getElementById('assetLocation').value.trim();
      const serial = document.getElementById('assetSerial').value.trim();
      const status = document.getElementById('assetStatus').value;
      const condition = document.getElementById('assetCondition').value;
      const purchaseDate = document.getElementById('assetPurchaseDate').value;
      const value = Number(document.getElementById('assetValue').value || 0);
      const supplier = document.getElementById('assetSupplier').value.trim();
      const warrantyEnd = document.getElementById('assetWarrantyEnd').value;
      const notes = document.getElementById('assetNotes').value.trim();

      if(!name || !category || !department || !custodian || !location){
        showToast('املأ البيانات الأساسية: الاسم، الفئة، القسم، المسؤول، والموقع.');
        return;
      }

      if(editMode){
        const index = assets.findIndex(a => a.code === editingCode);
        if(index === -1){
          showToast('الأصل غير موجود.');
          return;
        }

        assets[index] = {
          ...assets[index],
          code,
          name,
          category,
          model,
          department,
          custodian,
          location,
          serial,
          status,
          condition,
          purchaseDate,
          value,
          supplier,
          warrantyEnd,
          notes,
          updatedAt: new Date().toISOString()
        };

        showToast(`تم تحديث ${code} بنجاح`);
      }else{
        assets.unshift({
          code,
          name,
          category,
          model,
          department,
          custodian,
          location,
          serial,
          status,
          condition,
          purchaseDate,
          value,
          supplier,
          warrantyEnd,
          notes,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });

        showToast(`تمت إضافة ${code} بنجاح`);
      }

      saveAssets();
      closeModal();
      renderCurrentView();
    }

    function deleteAsset(code){
      const a = assets.find(x => x.code === code);
      if(!a) return;

      const ok = confirm(`هل تريد حذف الأصل ${code} نهائيًا؟`);
      if(!ok) return;

      assets = assets.filter(x => x.code !== code);
      saveAssets();
      showToast(`تم حذف ${code}`);
      closeModal();
      renderCurrentView();
    }

    async function copyCode(code){
      try{
        await navigator.clipboard.writeText(code);
        showToast(`تم نسخ ${code}`);
      }catch(e){
        showToast('تعذر النسخ من المتصفح الحالي.');
      }
    }

    async function startScanner(){
      const target = document.getElementById('scannerVideo');
      const resultBox = document.getElementById('scanResult');

      if(!target || !resultBox){
        showToast('افتح صفحة Scanner أولًا.');
        return;
      }

      stopScanner();

      if(!window.ZXing || !ZXing.BrowserMultiFormatReader){
        resultBox.innerHTML = '<div class="empty">مكتبة المسح لم تُحمّل بعد.</div>';
        return;
      }

      scannerReader = new ZXing.BrowserMultiFormatReader();
      resultBox.innerHTML = '<div class="empty">جاري فتح الكاميرا...</div>';

      try{
        scannerControls = await scannerReader.decodeFromVideoDevice(
          null,
          'scannerVideo',
          (result, err) => {
            if(result){
              const text = result.getText();
              findAsset(text);
            }
          }
        );
      }catch(e){
        resultBox.innerHTML = `
          <div class="empty">
            تعذر تشغيل الكاميرا.<br>
            تأكد من HTTPS وأنك تسمح بالوصول للكاميرا.
          </div>
        `;
      }
    }

    function findAsset(value){

        return;
      }

      const asset = assets.find(a =>
        String(a.code).toLowerCase() === q.toLowerCase() ||
        String(a.serial || '').toLowerCase() === q.toLowerCase()
      );

      if(!box) return;

      if(!asset){
        box.innerHTML = `
          <div class="empty">
            <div style="font-size:32px;margin-bottom:8px">❌</div>
            <div style="font-weight:700;color:#991b1b">لم يتم العثور على الأصل</div>
            <div class="muted" style="margin-top:8px">الكود: <span dir="ltr">${escapeHtml(q)}</span></div>

          <span><span class="badge ${statusClass(asset.status)}">${escapeHtml(asset.status)}</span></span>

          <div class="detail"><div class="k">الموقع</div><div class="v">${escapeHtml(asset.location)}</div></div>
          <div class="detail"><div class="k">السيريال</div><div class="v" dir="ltr">${escapeHtml(asset.serial || '-')}</div></div>
          <div class="detail"><div class="k">القيمة</div><div class="v">${formatCurrency(asset.value)}</div></div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">

          <button class="btn primary" onclick="openAssetForm('${escapeHtml(asset.code)}')">تعديل</button>
          <button class="btn ghost" onclick="copyCode('${escapeHtml(asset.code)}')">نسخ الكود</button>
        </div>
      `;

      requestAnimationFrame(() => {
        const svg = document.getElementById('scanBarcode');
        if(svg){
          JsBarcode(svg, asset.code, {

            background:'#ffffff',
            width:1.5,
            height:60,
            displayValue:true,
            fontSize:16,
            margin:0
          });
        }
      });
    }

    function renderReports(){
      setPageInfo('التقارير', 'إحصاءات سريعة + تصدير البيانات + إدارة النسخة');

      const total = assets.length;
      const totalValue = assets.reduce((s,a) => s + Number(a.value || 0), 0);

        acc[a.category] = (acc[a.category] || 0) + 1;
        return acc;
      }, {});
      const byDepartment = assets.reduce((acc,a) => {
        acc[a.department] = (acc[a.department] || 0) + Number(a.value || 0);
        return acc;
      }, {});

      `;
    }

    function exportCSV(){
      if(!assets.length){
        showToast('لا توجد بيانات للتصدير.');
        return;
      }

      const headers = [
        'code','name','category','model','department','custodian','location','serial',
        'status','condition','purchaseDate','value','supplier','warrantyEnd','notes','createdAt','updatedAt'
      ];

      const escapeCSV = (v) => {
        const s = String(v ?? '');
        return `"${s.replaceAll('"', '""')}"`;
      };

      const rows = [
        headers.join(','),
        ...assets.map(a => headers.map(h => escapeCSV(a[h])).join(','))
      ];

      const blob = new Blob(['\ufeff' + rows.join('\n')], { type:'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bevatel-assets.csv';
      a.click();
      URL.revokeObjectURL(url);
      showToast('تم تصدير CSV');
    }

    function exportJSON(){
      if(!assets.length){
        showToast('لا توجد بيانات للتصدير.');
        return;
      }

      const blob = new Blob([JSON.stringify(assets, null, 2)], { type:'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bevatel-assets.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('تم تصدير JSON');
    }

    function seedDemo(){
      const ok = confirm('سيتم استبدال البيانات الحالية بالداتا التجريبية. هل تريد المتابعة؟');

      assets = [...DEMO_ASSETS];

    function clearAllData(){

      assets = [];
      saveAssets();

      renderCurrentView();
    }
